<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator v2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="calculator3d">
    <div id="calculator">
<div id="background"></div>
       <input type="text" id="numberdisplay" readonly >
       <div id="numberkeys">
         <button onclick="appendToDisplay('+')" class="operation">+</button> <!--This basically mean add a "+" to the end of the display( <input type="text" id="numberdisplay" readonly>)  :D -->
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button>
        <button onclick="clearDisplay()">C</button>
        <br>
        <button onclick="appendToDisplay('-')" class="operation">-</button>
        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button onclick="removeFromDisplay()">⌫</button>
        <br>
        <button onclick="appendToDisplay('*')" class="operation">*</button>
        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <br>
        <button onclick="appendToDisplay('/')" class="operation">/</button>
        <button onclick="appendToDisplay('0')">0</button>
        <button onclick="appendToDisplay('.')">.</button>
        <button onclick="calculate()" class="operation">=</button>
        <br>
        <button onclick="appendToDisplay('**')">xʸ</button>
       <button onclick="appendToDisplay('Math.sqrt(')">√</button>
       </div>

    </div>
</div>
    <script src="index.js"></script>
</body>
</html>
